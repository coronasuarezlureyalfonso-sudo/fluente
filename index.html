<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F4F0; --surface: white; --border: #E6E4DE;
      --text: #1C1C1A; --muted: #8A8880; --accent: #1D9E75;
      --accent-dark: #085041; --input-bg: #F0EFE9;
      --sidebar-bg: #FAFAF8; --selected: #F0FAF6;
      --selected-border: #1D9E75;
    }
    [data-theme="dark"] {
      --bg: #131311; --surface: #1C1C1A; --border: #2A2A28;
      --text: #ECEAE3; --muted: #6A6860; --accent: #1D9E75;
      --input-bg: #222220; --sidebar-bg: #181816;
      --selected: #0D2920; --selected-border: #1D9E75;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .topbar { height: 48px; background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 16px; flex-shrink: 0; }
    .logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; margin-right: 24px; }
    .logo em { color: var(--accent); font-style: normal; }
    .tabs { display: flex; align-items: center; gap: 2px; flex: 1; }
    .tab { padding: 5px 12px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-radius: 7px; transition: all 0.12s; display: flex; align-items: center; gap: 6px; }
    .tab svg { width: 13px; height: 13px; }
    .tab:hover { background: var(--input-bg); color: var(--text); }
    .tab.active { background: var(--input-bg); color: var(--text); }
    .tab-badge { background: #E24B4A; color: white; font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 8px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .btn-sm { background: none; border: 0.5px solid var(--border); color: var(--muted); padding: 5px 10px; border-radius: 7px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; }
    .btn-sm svg { width: 12px; height: 12px; }
    .btn-sm:hover { background: var(--input-bg); color: var(--text); }
    .btn-accent { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 5px; }
    .btn-accent:hover { background: var(--accent-dark); }

    .app { display: flex; flex: 1; overflow: hidden; }
    .page { display: none; flex: 1; overflow: hidden; }
    .page.active { display: flex; }

    /* DASHBOARD */
    #page-dashboard { overflow-y: auto; flex-direction: column; }
    .dash-scroll { padding: 24px 28px 48px; max-width: 980px; margin: 0 auto; width: 100%; }
    .dash-greeting { margin-bottom: 20px; }
    .dash-greeting h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 6px; }
    .dash-greeting p { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
    .filtro-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .filtro-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .filtro-btn { padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border); font-size: 12px; cursor: pointer; background: var(--surface); color: var(--muted); font-family: inherit; transition: all 0.12s; }
    .filtro-btn.active { background: #085041; color: white; border-color: #085041; }
    .dash-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-bottom: 12px; }
    .dash-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: border-color 0.12s; }
    .dash-card:hover { border-color: var(--accent); }
    .accent-top { height: 3px; margin: -16px -18px 14px; border-radius: 12px 12px 0 0; }
    .card-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
    .card-num { font-size: 34px; font-weight: 600; letter-spacing: -1px; line-height: 1; margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .d-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
    .d-item:last-child { border-bottom: none; }
    .d-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-amber { background: #BA7517; } .dot-red { background: #E24B4A; } .dot-blue { background: #378ADD; } .dot-green { background: #1D9E75; }
    .d-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .d-meta { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .d-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 8px; flex-shrink: 0; }
    .db-red { background: #FCEBEB; color: #A32D2D; } .db-amber { background: #FAEEDA; color: #854F0B; }
    .db-blue { background: #E6F1FB; color: #0C447C; } .db-green { background: #E1F5EE; color: #085041; }
    .db-gray { background: var(--input-bg); color: var(--muted); }
    .clima-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 12px; }
    .cs { background: var(--input-bg); border-radius: 8px; padding: 8px 6px; text-align: center; }
    .cs-val { font-size: 18px; font-weight: 600; }
    .cs-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .aseg-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid var(--border); }
    .aseg-row:last-child { border-bottom: none; }
    .aseg-name { font-size: 13px; color: var(--text); flex: 1; }
    .aseg-pct { font-size: 11px; color: var(--muted); }
    .aseg-bar-w { width: 50px; height: 4px; background: var(--input-bg); border-radius: 2px; overflow: hidden; }
    .aseg-bar-f { height: 100%; border-radius: 2px; background: #1D9E75; }
    .aseg-monto { font-size: 12px; font-weight: 500; color: var(--text); min-width: 55px; text-align: right; }
    .prod-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
    .prod-row:last-child { border-bottom: none; }
    .tag { font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
    .tag-green { background: #E1F5EE; color: #085041; }
    .tag-gray { background: var(--input-bg); color: var(--muted); }
    .no-data { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }

    /* SPLIT VIEW */
    .split { display: flex; flex: 1; overflow: hidden; }
    .list-panel { width: 300px; flex-shrink: 0; border-right: 0.5px solid var(--border); background: var(--sidebar-bg); display: flex; flex-direction: column; overflow: hidden; }
    .list-search { padding: 10px 12px; border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .list-search-row { display: flex; gap: 6px; align-items: center; }
    .list-search input { flex: 1; padding: 6px 10px; border: 0.5px solid var(--border); border-radius: 7px; font-size: 13px; background: var(--surface); color: var(--text); font-family: inherit; }
    .list-search input:focus { outline: none; border-color: var(--accent); }
    .list-filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-chip { padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--border); font-size: 11px; cursor: pointer; background: var(--surface); color: var(--muted); font-family: inherit; transition: all 0.12s; }
    .filter-chip.active { background: #085041; color: white; border-color: #085041; }
    .list-sort { display: flex; gap: 4px; }
    .sort-btn { padding: 3px 8px; border-radius: 6px; border: 0.5px solid var(--border); font-size: 11px; cursor: pointer; background: var(--surface); color: var(--muted); font-family: inherit; }
    .sort-btn.active { background: var(--input-bg); color: var(--text); }
    .list-items { flex: 1; overflow-y: auto; }
    .list-item { padding: 11px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; display: flex; align-items: center; gap: 10px; }
    .list-item:hover { background: var(--input-bg); }
    .list-item.selected { background: var(--selected); border-left: 2px solid var(--selected-border); }
    .item-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; position: relative; }
    .av-t{background:#E1F5EE;color:#085041;} .av-b{background:#E6F1FB;color:#0C447C;} .av-p{background:#EEEDFE;color:#3C3489;} .av-a{background:#FAEEDA;color:#633806;} .av-c{background:#FAECE7;color:#712B13;}
    [data-theme="dark"] .av-t{background:#04342C;color:#9FE1CB} [data-theme="dark"] .av-b{background:#042C53;color:#B5D4F4} [data-theme="dark"] .av-p{background:#26215C;color:#CECBF6} [data-theme="dark"] .av-a{background:#412402;color:#FAC775} [data-theme="dark"] .av-c{background:#4A1B0C;color:#F0997B}
    .urgency-dot { position: absolute; top: -1px; right: -1px; width: 8px; height: 8px; border-radius: 50%; background: #E24B4A; border: 1.5px solid var(--sidebar-bg); }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 8px; flex-shrink: 0; }
    .ib-green{background:#E1F5EE;color:#085041;} .ib-amber{background:#FAEEDA;color:#854F0B;} .ib-red{background:#FCEBEB;color:#A32D2D;} .ib-blue{background:#E6F1FB;color:#0C447C;} .ib-gray{background:var(--input-bg);color:var(--muted);}
    .socio-badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 6px; }
    .sb-propio{background:#E1F5EE;color:#085041;} .sb-emaco{background:#E6F1FB;color:#0C447C;} .sb-grupo{background:#EEEDFE;color:#3C3489;}
    .list-empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

    /* DETAIL */
    .detail-panel { flex: 1; overflow-y: auto; background: var(--surface); display: flex; flex-direction: column; }
    .detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); gap: 10px; }
    .detail-empty svg { width: 36px; height: 36px; opacity: 0.2; }
    .detail-empty p { font-size: 14px; }
    .detail-header { padding: 20px 24px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-start; gap: 12px; }
    .detail-av { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; }
    .detail-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .detail-sub { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .detail-actions { margin-left: auto; display: flex; gap: 6px; }
    .btn-icon { background: none; border: 0.5px solid var(--border); cursor: pointer; padding: 6px; border-radius: 7px; color: var(--muted); display: flex; align-items: center; transition: all 0.12s; }
    .btn-icon svg { width: 13px; height: 13px; }
    .btn-icon:hover { background: var(--input-bg); color: var(--text); }
    .btn-icon.del:hover { background: #FCEBEB; color: #E24B4A; border-color: #F7C1C1; }
    .detail-body { padding: 20px 24px; }
    .detail-section { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; margin-top: 20px; }
    .detail-section:first-child { margin-top: 0; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-cell { background: var(--input-bg); border-radius: 8px; padding: 10px 12px; }
    .info-lbl { font-size: 11px; color: var(--muted); margin-bottom: 3px; font-weight: 500; }
    .info-val { font-size: 13px; color: var(--text); font-weight: 500; }
    .polizas-list { background: var(--sidebar-bg); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
    .pol-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 0.5px solid var(--border); gap: 10px; }
    .pol-row:last-child { border-bottom: none; }
    .pol-num { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; }
    .pol-meta { font-size: 11px; color: var(--muted); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-green{background:#E1F5EE;color:#085041;} .badge-red{background:#FCEBEB;color:#A32D2D;} .badge-amber{background:#FAEEDA;color:#854F0B;} .badge-blue{background:#E6F1FB;color:#0C447C;} .badge-gray{background:var(--input-bg);color:var(--muted);}
    .tramite-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: var(--sidebar-bg); border: 0.5px solid var(--border); border-radius: 9px; margin-bottom: 8px; }
    .tram-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .tram-tipo { font-size: 13px; font-weight: 500; color: var(--text); }
    .tram-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .notas-area { width: 100%; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: 9px; font-size: 13px; color: var(--text); background: var(--input-bg); font-family: inherit; resize: vertical; min-height: 80px; line-height: 1.5; }
    .notas-area:focus { outline: none; border-color: var(--accent); }
    .btn-save-notas { background: var(--accent); color: white; border: none; padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .btn-save-notas:hover { background: var(--accent-dark); }
    .pago-status { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; }
    .pago-pagada { background: #E1F5EE; border: 0.5px solid #9FE1CB; }
    .pago-pendiente { background: #FCEBEB; border: 0.5px solid #F7C1C1; }
    .pago-gracia { background: #FAEEDA; border: 0.5px solid #FAC775; }
    .pago-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pago-icon svg { width: 16px; height: 16px; }
    .pago-label { font-size: 13px; font-weight: 600; }
    .pago-sublabel { font-size: 11px; margin-top: 2px; }
    .btn-marcar-pagada { margin-left: auto; background: #1D9E75; color: white; border: none; padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
    .dias-restantes { text-align: center; padding: 16px; margin-bottom: 8px; background: var(--input-bg); border-radius: 10px; }
    .dias-num { font-size: 40px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
    .dias-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .edit-form { padding: 20px 24px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .form-full { grid-column: 1/-1; }
    .field { display: flex; flex-direction: column; }
    .field-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); background: var(--input-bg); font-family: inherit; transition: border-color 0.15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }
    .btn-save { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; font-family: inherit; }
    .btn-save:hover { background: var(--accent-dark); }
    .msg-ok { font-size: 12px; color: var(--accent); margin-top: 8px; text-align: center; font-weight: 500; }
    .msg-err { font-size: 12px; color: #E24B4A; margin-top: 8px; text-align: center; }
    .status-sel { padding: 4px 8px; border: 0.5px solid var(--border); border-radius: 6px; font-size: 12px; background: var(--surface); color: var(--text); cursor: pointer; font-family: inherit; }
    .confirm-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
    .confirm-bg.open { display: flex; }
    .confirm { background: var(--surface); border-radius: 14px; padding: 26px 22px; width: 320px; border: 0.5px solid var(--border); text-align: center; }
    .confirm h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .confirm p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 8px; }
    .btn-cancel { flex:1; background:none; border:0.5px solid var(--border); color:var(--text); padding:9px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }
    .btn-del { flex:1; background:#E24B4A; color:white; border:none; padding:9px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">fluente<em>.</em></div>
  <div class="tabs">
    <div class="tab active" onclick="showPage('dashboard',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Inicio
    </div>
    <div class="tab" onclick="showPage('clientes',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </div>
    <div class="tab" onclick="showPage('polizas',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Pólizas
    </div>
    <div class="tab" onclick="showPage('tramites',this)">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      Trámites
      <span class="tab-badge" id="badge-tramites" style="display:none">0</span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn-sm" onclick="toggleDark()" id="dark-btn">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="dark-label">Oscuro</span>
    </button>
    <button class="btn-accent" id="btn-nuevo" onclick="mostrarFormNuevo()" style="display:none">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo
    </button>
  </div>
</div>

<div class="app">

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="dash-scroll" id="dash-inner"></div>
  </div>

  <!-- CLIENTES -->
  <div class="page" id="page-clientes">
    <div class="split">
      <div class="list-panel">
        <div class="list-search">
          <div class="list-search-row">
            <input placeholder="Buscar cliente..." oninput="filtrarC(this.value)" id="search-c" />
            <div class="list-sort">
              <button class="sort-btn active" id="sort-az" onclick="setSortC('az',this)">A-Z</button>
              <button class="sort-btn" id="sort-za" onclick="setSortC('za',this)">Z-A</button>
            </div>
          </div>
          <div class="list-filter-row" id="filtros-c">
            <button class="filter-chip active" onclick="setFiltroC('todos',this)">Todos</button>
            <button class="filter-chip" onclick="setFiltroC('Propio',this)">Propio</button>
            <button class="filter-chip" onclick="setFiltroC('EMACO',this)">EMACO</button>
            <button class="filter-chip" onclick="setFiltroC('Grupo Cien',this)">Grupo Cien</button>
          </div>
        </div>
        <div class="list-items" id="list-clientes"></div>
      </div>
      <div class="detail-panel" id="detail-clientes">
        <div class="detail-empty">

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
  const sb = createClient(

  const NOMBRE_AGENTE = 'Eduardo'

  const GRACIA_DIAS = { 'Qualitas':14 }

  let clientes=[], polizas=[], tramites=[], polPorCliente={}

  const AV=['av-t','av-b','av-p','av-a','av-c']

  const dias = f => f ? Math.ceil((new Date(f)-new Date())/86400000) : null
  const eB = f => { const d=dias(f); if(d===null) return '<span class="badge badge-gray">Sin fecha</span>'; if(d<0) return '<span class="badge badge-red">Vencida</span>'; if(d<=30) return `<span class="badge badge-amber">${d} días</span>`; return '<span class="badge badge-green">Vigente</span>' }
  const iBclass = f => { const d=dias(f); if(d===null) return 'ib-gray'; if(d<0) return 'ib-red'; if(d<=30) return 'ib-amber'; return 'ib-green' }
  const iBtext = f => { const d=dias(f); if(d===null) return 'Sin fecha'; if(d<0) return 'Vencida'; if(d<=30) return `${d}d`; return 'Vigente' }
  const socioClass = s => s==='EMACO'?'sb-emaco':s==='Grupo Cien'?'sb-grupo':'sb-propio'
  const editSvg = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>`
  const trashSvg = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`

  const MENSAJES = {
    madrugada: ['La cartera no duerme, '+NOMBRE_AGENTE+'.','Horas extra, resultados extra, '+NOMBRE_AGENTE+'.','Los mejores agentes madrugan, '+NOMBRE_AGENTE+'.'],
    manana: ['El día es tuyo, '+NOMBRE_AGENTE+'.','Hoy es un buen día para renovar, '+NOMBRE_AGENTE+'.','Arrancando con todo, '+NOMBRE_AGENTE+'.','La cartera te espera, '+NOMBRE_AGENTE+'.'],
    mediodia: ['A medio camino y sin parar, '+NOMBRE_AGENTE+'.','El mejor momento para dar seguimiento, '+NOMBRE_AGENTE+'.','La tarde viene cargada, '+NOMBRE_AGENTE+'.'],
    tarde: ['Todavía queda día, '+NOMBRE_AGENTE+'.','Cada trámite cerrado cuenta, '+NOMBRE_AGENTE+'.','Los grandes agentes no bajan el ritmo, '+NOMBRE_AGENTE+'.','Cerrando fuerte, '+NOMBRE_AGENTE+'.'],
    noche: ['Terminando el día con ventaja, '+NOMBRE_AGENTE+'.','Mañana arrancas adelantado, '+NOMBRE_AGENTE+'.','Un día más construyendo tu cartera, '+NOMBRE_AGENTE+'.']
  }

  function getSaludo() {
    const h = new Date().getHours()
    if(h>=0&&h<6) return MENSAJES.madrugada
    if(h>=6&&h<12) return MENSAJES.manana
    if(h>=12&&h<14) return MENSAJES.mediodia
    if(h>=14&&h<20) return MENSAJES.tarde
    return MENSAJES.noche
  }

  function graciasDias(aseg) { return GRACIA_DIAS[aseg] || GRACIA_DEFAULT }

  async function cargar() {
    const [rc,rp,rt] = await Promise.all([
      sb.from('clientes').select('*').order('nombre',{ascending:true}),
      sb.from('polizas').select('*').order('fecha_fin',{ascending:true}),
      sb.from('tramites').select('*').order('created_at',{ascending:false})
    ])
    clientes=rc.data||[]; polizas=rp.data||[]; tramites=rt.data||[]
    polPorCliente={}; polizas.forEach(p=>{polPorCliente[p.cliente]=(polPorCliente[p.cliente]||0)+1})
    const pend=tramites.filter(t=>t.estatus!=='Resuelto')
    const badge=document.getElementById('badge-tramites')
    if(pend.length>0){badge.textContent=pend.length;badge.style.display='inline'}else{badge.style.display='none'}
    renderDash()
    renderListC(applyFiltersC(clientes))
    renderListP(applyFiltersP(polizas))
    renderListT(applyFiltersT(tramites))
    if(selC){const c=clientes.find(x=>x.id===selC);if(c)showDetailC(c)}
    if(selP){const p=polizas.find(x=>x.id===selP);if(p)showDetailP(p)}
    if(selT){const t=tramites.find(x=>x.id===selT);if(t)showDetailT(t)}
  }

  function renderDash() {
    if(!mensajeDash) {
      const msgs = getSaludo()
      mensajeDash = msgs[Math.floor(Math.random()*msgs.length)]
    }
    const msg = mensajeDash
    const fecha = new Date().toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})
    const fechaStr = fecha.charAt(0).toUpperCase()+fecha.slice(1)

    const ren = polizas.filter(p=>{const d=dias(p.fecha_fin);return d!==null&&d>=0&&d<=filtroD})
    const pagosGracia = polizas.filter(p=>{
      if(filtroD===60) return false
      const d = dias(p.fecha_fin)
      const g = graciasDias(p.aseguradora)
      return d!==null && d<0 && Math.abs(d)<=g && !p.pagada
    })
    const tramActivos = tramites.filter(t=>t.estatus!=='Resuelto')
    const vencidas = polizas.filter(p=>{const d=dias(p.fecha_fin);return d!==null&&d<0})
    const vigentes = polizas.filter(p=>{const d=dias(p.fecha_fin);return d!==null&&d>30})
    const porVencer = polizas.filter(p=>{const d=dias(p.fecha_fin);return d!==null&&d>=0&&d<=30})
    const total = polizas.length
    const climaPct = total===0?100:Math.round((vigentes.length/total)*100)
    const climaColor = climaPct>=80?'#1D9E75':climaPct>=50?'#BA7517':'#E24B4A'
    const climaBg = climaPct>=80?'#E1F5EE':climaPct>=50?'#FAEEDA':'#FCEBEB'
    const climaLabel = climaPct>=80?'Saludable':climaPct>=50?'Requiere atención':'En riesgo'

    const comisionesMap = {}
    polizas.forEach(p=>{
      if(!p.prima||p.prima<=0) return
      const pct = COMISIONES_PCT[p.aseguradora]||10
      if(!comisionesMap[p.aseguradora]) comisionesMap[p.aseguradora]={pct,total:0}
      comisionesMap[p.aseguradora].total += Math.round(p.prima*pct/100)
    })
    const comisionesList = Object.entries(comisionesMap).sort((a,b)=>b[1].total-a[1].total)
    const maxCom = comisionesList.length?comisionesList[0][1].total:1
    const totalCom = comisionesList.reduce((s,[,v])=>s+v.total,0)

    const polPagadasMes = polizas.filter(p=>p.pagada&&p.fecha_pago&&new Date(p.fecha_pago).getMonth()===new Date().getMonth())
    const polPendientesPago = polizas.filter(p=>!p.pagada&&dias(p.fecha_fin)!==null&&dias(p.fecha_fin)<0)
    const masViejoTram = tramActivos.length?Math.max(...tramActivos.map(t=>Math.ceil((new Date()-new Date(t.created_at))/86400000))):0

    document.getElementById('dash-inner').innerHTML=`
      <div class="dash-greeting">
        <h1>${msg}</h1>
        <p>${fechaStr}</p>
      </div>
      <div class="filtro-bar">
        <span class="filtro-label">Período:</span>
        <button class="filtro-btn ${filtroD===7?'active':''}" onclick="setFiltroD(7)">7 días</button>
        <button class="filtro-btn ${filtroD===14?'active':''}" onclick="setFiltroD(14)">14 días</button>
        <button class="filtro-btn ${filtroD===30?'active':''}" onclick="setFiltroD(30)">30 días</button>
        <button class="filtro-btn ${filtroD===60?'active':''}" onclick="setFiltroD(60)">60 días</button>
      </div>
      <div class="dash-grid">
        <div class="dash-card" onclick="irPolizas('por_vencer')">
          <div class="accent-top" style="background:#BA7517"></div>
          <div class="card-label">Pólizas por renovar</div>
          <div class="card-num" style="color:#BA7517">${ren.length}</div>
          <div class="card-sub">en los próximos ${filtroD} días</div>
          ${ren.length?ren.slice(0,4).map(p=>`<div class="d-item">
            <div class="d-dot dot-amber"></div>
            <div class="d-name">${p.cliente||'—'}</div>
            <div class="d-meta">${p.numero_poliza}</div>
            <span class="d-badge ${dias(p.fecha_fin)<=7?'db-red':'db-amber'}">${dias(p.fecha_fin)}d</span>
          </div>`).join('')+(ren.length>4?`<div style="font-size:12px;color:var(--muted);padding-top:8px">+${ren.length-4} más</div>`:''): `<div class="no-data">Sin renovaciones urgentes</div>`}
        </div>

        <div class="dash-card">
          <div class="accent-top" style="background:#E24B4A"></div>
          <div class="card-label">Pagos pendientes</div>
          <div class="card-num" style="color:#E24B4A">${filtroD===60?'—':pagosGracia.length}</div>
          <div class="card-sub">${filtroD===60?'No aplica para 60 días':'dentro del período de gracia'}</div>
          ${filtroD!==60&&pagosGracia.length?pagosGracia.slice(0,4).map(p=>{
            const g=graciasDias(p.aseguradora); const diasVenc=Math.abs(dias(p.fecha_fin)); const restantes=g-diasVenc
            return`<div class="d-item">
              <div class="d-dot dot-red"></div>
              <div style="flex:1;min-width:0"><div class="d-name">${p.cliente||'—'}</div><div class="d-meta">Gracia: ${g}d · ${p.aseguradora}</div></div>
              <span class="d-badge db-red">${restantes}d</span>
            </div>`
          }).join(''):(filtroD!==60?`<div class="no-data">Sin pagos pendientes</div>`:'')}
        </div>

        <div class="dash-card">
          <div class="accent-top" style="background:#378ADD"></div>
          <div class="card-label">Trámites en mesa</div>
          <div class="card-num" style="color:#378ADD">${tramActivos.length}</div>
          <div class="card-sub">${tramActivos.length?`activos · más viejo: ${masViejoTram} días`:'sin trámites activos'}</div>
          ${tramActivos.slice(0,4).map(t=>{
            const d=Math.ceil((new Date()-new Date(t.created_at))/86400000)
            const bc=t.estatus==='En proceso'?'db-blue':t.estatus==='En espera de documentos'?'db-amber':'db-red'
            return`<div class="d-item">
              <div class="d-dot ${t.estatus==='En proceso'?'dot-blue':t.estatus==='En espera de documentos'?'dot-amber':'dot-red'}"></div>
              <div style="flex:1;min-width:0"><div class="d-name">${t.tipo} · ${t.cliente||'—'}</div><div class="d-meta">${t.aseguradora||''}</div></div>
              <span class="d-badge ${bc}">${d}d</span>
            </div>`
          }).join('')}
          ${!tramActivos.length?`<div class="no-data">Todo resuelto</div>`:''}
        </div>
      </div>

      <div class="dash-grid">
        <div class="dash-card">
          <div class="accent-top" style="background:#1D9E75"></div>
          <div class="card-label">Clima de cartera</div>
          <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
            <div class="card-num" style="color:${climaColor}">${climaPct}%</div>
            <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${climaBg};color:${climaColor};font-weight:600">${climaLabel}</span>
          </div>
          <div class="card-sub">pólizas vigentes · últimos 30 días</div>
          <div class="clima-stats">
            <div class="cs"><div class="cs-val" style="color:#1D9E75">${vigentes.length}</div><div class="cs-lbl">Vigentes</div></div>
            <div class="cs"><div class="cs-val" style="color:#BA7517">${porVencer.length}</div><div class="cs-lbl">Por vencer</div></div>
            <div class="cs"><div class="cs-val" style="color:#E24B4A">${vencidas.length}</div><div class="cs-lbl">Vencidas</div></div>
          </div>
        </div>

        <div class="dash-card">
          <div class="accent-top" style="background:#533AB7"></div>
          <div class="card-label">Comisiones por aseguradora</div>
          ${totalCom>0?`<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:10px">
            <span style="font-size:22px;font-weight:600;color:var(--text)">$${totalCom.toLocaleString('es-MX')}</span>
            <span style="font-size:13px;color:var(--muted)">estimado este mes</span>
          </div>`:`<div class="card-sub" style="margin-bottom:10px">Agrega primas para calcular</div>`}
          ${comisionesList.slice(0,4).map(([aseg,v])=>`<div class="aseg-row">
            <div class="aseg-name">${aseg}</div>
            <div class="aseg-pct">${v.pct}%</div>
            <div class="aseg-bar-w"><div class="aseg-bar-f" style="width:${Math.round((v.total/maxCom)*100)}%"></div></div>
            <div class="aseg-monto">$${v.total.toLocaleString('es-MX')}</div>
          </div>`).join('')}
          ${!comisionesList.length?`<div class="no-data">Sin primas registradas</div>`:''}
        </div>

        <div class="dash-card">
          <div class="accent-top" style="background:#1D9E75"></div>
          <div class="card-label">Producción del mes</div>
          <div style="display:flex;gap:20px;margin-bottom:12px">
            <div>
              <div style="font-size:26px;font-weight:600;color:#1D9E75">${polPagadasMes.length}</div>
              <div style="font-size:12px;color:var(--muted)">pagadas</div>
            </div>
            <div>
              <div style="font-size:26px;font-weight:600;color:#BA7517">${polPendientesPago.length}</div>
              <div style="font-size:12px;color:var(--muted)">pendientes de pago</div>
            </div>
          </div>
          ${polPagadasMes.slice(0,2).map(p=>`<div class="prod-row">
            <div style="font-size:13px;color:var(--muted)">${p.cliente||'—'}</div>
            <div style="display:flex;align-items:center;font-size:13px;font-weight:500;color:var(--text)">${p.aseguradora}<span class="tag tag-green">Pagada</span></div>
          </div>`).join('')}
          ${polPendientesPago.slice(0,1).map(p=>`<div class="prod-row">
            <div style="font-size:13px;color:var(--muted)">${p.cliente||'—'}</div>
            <div style="display:flex;align-items:center;font-size:13px;font-weight:500;color:var(--text)">${p.aseguradora}<span class="tag tag-gray">Pendiente</span></div>
          </div>`).join('')}
          ${(polPagadasMes.length+polPendientesPago.length)>3?`<div style="font-size:12px;color:var(--muted);padding-top:8px">+${polPagadasMes.length+polPendientesPago.length-3} más este mes</div>`:''}
          ${!polPagadasMes.length&&!polPendientesPago.length?`<div class="no-data">Sin producción registrada</div>`:''}
        </div>
      </div>`
  }

  function applyFiltersC(lista) {
    let r = [...lista]
    if(filtroSocioC!=='todos') r=r.filter(c=>(c.socio||'Propio')===filtroSocioC)
    const q = document.getElementById('search-c')?.value||''
    if(q) r=r.filter(c=>(c.nombre+c.telefono+c.correo+c.aseguradora).toLowerCase().includes(q.toLowerCase()))
    r.sort((a,b)=>sortC==='az'?a.nombre.localeCompare(b.nombre,'es'):b.nombre.localeCompare(a.nombre,'es'))
    return r
  }

  function applyFiltersP(lista) {
    let r = [...lista]
    if(filtroEstatus==='vigentes') r=r.filter(p=>{const d=dias(p.fecha_fin);return d!==null&&d>30})
    else if(filtroEstatus==='por_vencer') r=r.filter(p=>{const d=dias(p.fecha_fin);return d!==null&&d>=0&&d<=30})
    else if(filtroEstatus==='vencidas') r=r.filter(p=>{const d=dias(p.fecha_fin);return d!==null&&d<0})
    if(filtroPago==='pagadas') r=r.filter(p=>p.pagada)
    else if(filtroPago==='pendientes') r=r.filter(p=>!p.pagada)
    return r
  }

  function applyFiltersT(lista) {
    let r = [...lista]
    if(filtroAsegT!=='todas') r=r.filter(t=>t.aseguradora===filtroAsegT)
    if(filtroEstatusT!=='todos') r=r.filter(t=>t.estatus===filtroEstatusT)
    return r
  }

  function renderListC(lista) {
    const el=document.getElementById('list-clientes')
    if(!lista.length){el.innerHTML=`<div class="list-empty">No hay clientes</div>`;return}
    el.innerHTML=lista.map(c=>{

  function showDetailP(p) {
    const d = dias(p.fecha_fin)
    const diasNum = d !== null ? Math.abs(d) : null
    const diasColor = d===null?'var(--muted)':d<0?'#E24B4A':d<=30?'#BA7517':'#1D9E75'
    const diasLabel = d===null?'Sin fecha':d<0?'días vencida':d===0?'vence hoy':'días restantes'
    const comPct = COMISIONES_PCT[p.aseguradora]||10
    const comMonto = p.prima?Math.round(p.prima*comPct/100):null
    const g = graciasDias(p.aseguradora)
    let pagoHtml = ''
    if(p.pagada) {
      pagoHtml=`<div class="pago-status pago-pagada">
        <div class="pago-icon" style="background:#E1F5EE;color:#1D9E75"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>
        <div><div class="pago-label" style="color:#085041">Póliza pagada</div><div class="pago-sublabel" style="color:#1D9E75">${p.fecha_pago?'Pagada el '+p.fecha_pago:'Marcada como pagada'}</div></div>
      </div>`
    } else if(d!==null&&d<0&&Math.abs(d)<=g) {
      const rest=g-Math.abs(d)
      pagoHtml=`<div class="pago-status pago-gracia">
        <div class="pago-icon" style="background:#FAEEDA;color:#BA7517"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div style="flex:1"><div class="pago-label" style="color:#633806">En período de gracia</div><div class="pago-sublabel" style="color:#BA7517">${rest} días restantes de ${g} días · ${p.aseguradora}</div></div>
        <button class="btn-marcar-pagada" onclick="marcarPagada(${p.id})">Marcar pagada</button>
      </div>`
    } else if(d!==null&&d<0) {
      pagoHtml=`<div class="pago-status pago-pendiente">
        <div class="pago-icon" style="background:#FCEBEB;color:#E24B4A"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
        <div><div class="pago-label" style="color:#A32D2D">Período de gracia vencido</div><div class="pago-sublabel" style="color:#E24B4A">Póliza cancelada por falta de pago</div></div>
      </div>`
    } else {
      pagoHtml=`<div class="pago-status" style="background:var(--input-bg);border:0.5px solid var(--border)">
        <div class="pago-icon" style="background:var(--surface);color:var(--muted)"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div style="flex:1"><div class="pago-label" style="color:var(--text)">Vigente · sin vencer</div><div class="pago-sublabel" style="color:var(--muted)">Póliza al corriente</div></div>
        <button class="btn-marcar-pagada" onclick="marcarPagada(${p.id})">Marcar pagada</button>
      </div>`
    }

    document.getElementById('detail-polizas').innerHTML=`<div>
      <div class="detail-header">
        <div class="detail-av ${avC(p.cliente||'A')}">${ini(p.cliente||'?')}</div>
        <div style="flex:1">
          <div class="detail-title">${p.numero_poliza||'—'}</div>
          <div class="detail-sub">${p.cliente||'—'} · ${p.aseguradora||'—'}${p.socio?` · <span class="socio-badge ${socioClass(p.socio)}">${p.socio}</span>`:''}</div>
        </div>
        <div class="detail-actions">
          <button class="btn-icon" onclick="editarP(${p.id})">${editSvg}</button>
          <button class="btn-icon del" onclick="del('polizas',${p.id})">${trashSvg}</button>
        </div>
      </div>
      <div class="detail-body">
        <div class="dias-restantes">
          <div class="dias-num" style="color:${diasColor}">${diasNum!==null?diasNum:'—'}</div>
          <div class="dias-lbl">${diasLabel}</div>
        </div>
        ${pagoHtml}
        <div class="detail-section">Detalles</div>
        <div class="info-grid">
          <div class="info-cell"><div class="info-lbl">Aseguradora</div><div class="info-val">${p.aseguradora||'—'}</div></div>
          <div class="info-cell"><div class="info-lbl">Ramo</div><div class="info-val">${p.ramo||'—'}</div></div>

          <div class="info-cell"><div class="info-lbl">Vencimiento</div><div class="info-val">${p.fecha_fin||'—'}</div></div>
          <div class="info-cell"><div class="info-lbl">Prima</div><div class="info-val">${p.prima?'$'+Number(p.prima).toLocaleString('es-MX'):'Sin prima'}</div></div>
          <div class="info-cell"><div class="info-lbl">Comisión est.</div><div class="info-val">${comMonto?'$'+comMonto.toLocaleString('es-MX')+' ('+comPct+'%)':'—'}</div></div>

        <div class="detail-section">Notas</div>
        <textarea class="notas-area" id="notas-p-${p.id}" placeholder="Notas de la póliza...">${p.notas||''}</textarea>
        <button class="btn-save-notas" onclick="guardarNotas('polizas',${p.id},'notas-p-${p.id}','msg-notas-p')">Guardar notas</button>

  window.guardarNotas = async function(tabla, id, inputId, msgId) {
    const notas = document.getElementById(inputId)?.value||''
    const {error} = await sb.from(tabla).update({notas}).eq('id',id)
    const msg = document.getElementById(msgId)
    if(msg) { msg.className='msg-ok'; msg.textContent='Notas guardadas'; setTimeout(()=>{if(msg)msg.textContent=''},2000) }
    if(tabla==='clientes'){const c=clientes.find(x=>x.id===id);if(c)c.notas=notas}
    else{const p=polizas.find(x=>x.id===id);if(p)p.notas=notas}
  }

      <div class="detail-header"><div><div class="detail-title">Editar póliza</div><div class="detail-sub">${p.numero_poliza}</div></div></div>
      <div class="edit-form"><div class="form-grid">
        <div class="field"><div class="field-label">Número</div><input id="e-numero" value="${p.numero_poliza||''}" /></div>
        <div class="field"><div class="field-label">Aseguradora</div><input id="e-paseg" value="${p.aseguradora||''}" /></div>
        <div class="field"><div class="field-label">Cliente</div><input id="e-pcli" value="${p.cliente||''}" /></div>
        <div class="field"><div class="field-label">Ramo</div><select id="e-ramo"><option value="">Seleccionar</option><option ${p.ramo==='Auto'?'selected':''}>Auto</option><option ${p.ramo==='Gastos Médicos'?'selected':''}>Gastos Médicos</option><option ${p.ramo==='Vida'?'selected':''}>Vida</option><option ${p.ramo==='Empresarial'?'selected':''}>Empresarial</option><option ${p.ramo==='Daños'?'selected':''}>Daños</option></select></div>
        <div class="field"><div class="field-label">Prima</div><input id="e-prima" type="number" value="${p.prima||''}" placeholder="0.00" /></div>
        <div class="field"><div class="field-label">Socio</div><select id="e-psocio"><option ${(p.socio||'Propio')==='Propio'?'selected':''}>Propio</option><option ${p.socio==='EMACO'?'selected':''}>EMACO</option><option ${p.socio==='Grupo Cien'?'selected':''}>Grupo Cien</option></select></div>
        <div class="field"><div class="field-label">Inicio</div><input id="e-inicio" type="date" value="${p.fecha_inicio||''}" /></div>
        <div class="field"><div class="field-label">Vencimiento</div><input id="e-fin" type="date" value="${p.fecha_fin||''}" /></div>
      </div><button class="btn-save" onclick="updateP(${p.id})">Guardar cambios</button><div id="e-msg"></div></div>
    </div>`
  }

  window.editarT = function(id) {
    const t=tramites.find(x=>x.id===id);if(!t)return
    document.getElementById('detail-tramites').innerHTML=`<div>
      <div class="detail-header"><div><div class="detail-title">Editar trámite</div><div class="detail-sub">${t.tipo}</div></div></div>
      <div class="edit-form"><div class="form-grid">
        <div class="field"><div class="field-label">Tipo</div><select id="e-tipo"><option ${t.tipo==='Reembolso'?'selected':''}>Reembolso</option><option ${t.tipo==='Endoso'?'selected':''}>Endoso</option><option ${t.tipo==='Siniestro'?'selected':''}>Siniestro</option><option ${t.tipo==='Cambio de agente'?'selected':''}>Cambio de agente</option><option ${t.tipo==='Cancelación'?'selected':''}>Cancelación</option><option ${t.tipo==='Otro'?'selected':''}>Otro</option></select></div>
        <div class="field"><div class="field-label">Estatus</div><select id="e-estatus"><option ${t.estatus==='Pendiente'?'selected':''}>Pendiente</option><option ${t.estatus==='En proceso'?'selected':''}>En proceso</option><option ${t.estatus==='En espera de documentos'?'selected':''}>En espera de documentos</option><option ${t.estatus==='Resuelto'?'selected':''}>Resuelto</option></select></div>
        <div class="field"><div class="field-label">Cliente</div><input id="e-tcli" value="${t.cliente||''}" /></div>
        <div class="field"><div class="field-label">Aseguradora</div><input id="e-taseg" value="${t.aseguradora||''}" /></div>
        <div class="field form-full"><div class="field-label">Descripción</div><textarea id="e-desc">${t.descripcion||''}</textarea></div>
      </div><button class="btn-save" onclick="updateT(${t.id})">Guardar cambios</button><div id="e-msg"></div></div>
    </div>`
  }

  window.updateC = async function(id) {
    const msg=document.getElementById('e-msg')
    const d={nombre:document.getElementById('e-nombre').value,telefono:document.getElementById('e-telefono').value,correo:document.getElementById('e-correo').value,aseguradora:document.getElementById('e-aseguradora').value,socio:document.getElementById('e-socio').value}
    const{error}=await sb.from('clientes').update(d).eq('id',id)
    if(error){msg.className='msg-err';msg.textContent='Error: '+error.message}
    else{msg.className='msg-ok';msg.textContent='Guardado';setTimeout(()=>cargar(),700)}
  }

  window.updateP = async function(id) {
    const msg=document.getElementById('e-msg')
    const d={numero_poliza:document.getElementById('e-numero').value,aseguradora:document.getElementById('e-paseg').value,cliente:document.getElementById('e-pcli').value,ramo:document.getElementById('e-ramo').value,prima:parseFloat(document.getElementById('e-prima').value)||null,socio:document.getElementById('e-psocio').value,fecha_inicio:document.getElementById('e-inicio').value,fecha_fin:document.getElementById('e-fin').value}
    const{error}=await sb.from('polizas').update(d).eq('id',id)
    if(error){msg.className='msg-err';msg.textContent='Error: '+error.message}
    else{msg.className='msg-ok';msg.textContent='Guardado';setTimeout(()=>cargar(),700)}
  }

  window.updateT = async function(id) {
    const msg=document.getElementById('e-msg')
    const d={tipo:document.getElementById('e-tipo').value,estatus:document.getElementById('e-estatus').value,cliente:document.getElementById('e-tcli').value,aseguradora:document.getElementById('e-taseg').value,descripcion:document.getElementById('e-desc').value}
    const{error}=await sb.from('tramites').update(d).eq('id',id)
    if(error){msg.className='msg-err';msg.textContent='Error: '+error.message}
    else{msg.className='msg-ok';msg.textContent='Guardado';setTimeout(()=>cargar(),700)}
  }

  window.guardarNuevoC = async function() {
    const msg=document.getElementById('n-msg')
    const nombre=document.getElementById('n-nombre').value
    if(!nombre){msg.className='msg-err';msg.textContent='El nombre es requerido';return}
    const d={nombre,telefono:document.getElementById('n-telefono').value,correo:document.getElementById('n-correo').value,aseguradora:document.getElementById('n-aseguradora').value,socio:document.getElementById('n-socio').value}
    const{error}=await sb.from('clientes').insert([d])
    if(error){msg.className='msg-err';msg.textContent='Error: '+error.message}
    else{msg.className='msg-ok';msg.textContent='Cliente agregado';setTimeout(()=>cargar(),700)}
  }

  window.guardarNuevoP = async function() {
    const msg=document.getElementById('n-msg')
    const numero_poliza=document.getElementById('n-numero').value
    if(!numero_poliza){msg.className='msg-err';msg.textContent='El número es requerido';return}
    const d={numero_poliza,aseguradora:document.getElementById('n-paseg').value,cliente:document.getElementById('n-pcli').value,ramo:document.getElementById('n-ramo').value,prima:parseFloat(document.getElementById('n-prima').value)||null,socio:document.getElementById('n-psocio').value,fecha_inicio:document.getElementById('n-inicio').value,fecha_fin:document.getElementById('n-fin').value,pagada:false}
    const{error}=await sb.from('polizas').insert([d])
    if(error){msg.className='msg-err';msg.textContent='Error: '+error.message}
    else{msg.className='msg-ok';msg.textContent='Póliza agregada';setTimeout(()=>cargar(),700)}
  }

  window.guardarNuevoT = async function() {
    const msg=document.getElementById('n-msg')
    const tipo=document.getElementById('n-tipo').value
    if(!tipo){msg.className='msg-err';msg.textContent='El tipo es requerido';return}
    const d={tipo,estatus:document.getElementById('n-estatus').value,cliente:document.getElementById('n-tcli').value,aseguradora:document.getElementById('n-taseg').value,descripcion:document.getElementById('n-desc').value}
    const{error}=await sb.from('tramites').insert([d])
    if(error){msg.className='msg-err';msg.textContent='Error: '+error.message}
    else{msg.className='msg-ok';msg.textContent='Trámite agregado';setTimeout(()=>cargar(),700)}
  }

  window.cambiaE = async function(id,estatus){await sb.from('tramites').update({estatus}).eq('id',id);cargar()}
  window.del = function(tabla,id){pending={tabla,id};document.getElementById('confirm-modal').classList.add('open')}
  window.cerrarConfirm = ()=>{document.getElementById('confirm-modal').classList.remove('open');pending=null}
  window.confirmarEliminar = async function(){
    if(!pending)return
    await sb.from(pending.tabla).delete().eq('id',pending.id)
    selC=null;selP=null;selT=null;cerrarConfirm();cargar()
  }

  window.showPage = function(page,el){
    paginaActual=page
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
    document.getElementById('page-'+page).classList.add('active')
    if(el) el.classList.add('active')
    document.getElementById('btn-nuevo').style.display=page==='dashboard'?'none':'flex'
  }

  window.toggleDark = function(){
    const dark=document.documentElement.getAttribute('data-theme')==='dark'
    document.documentElement.setAttribute('data-theme',dark?'light':'dark')
    document.getElementById('dark-label').textContent=dark?'Oscuro':'Claro'
  }

  cargar()
</script>
</body>
</html>
